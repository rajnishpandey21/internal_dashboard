<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerKaptain Internal - Dynamic Dashboard</title>
    <!-- Include Chart.js library -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>

    <style>
        /* --- Universal Box Sizing --- */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        /* --- General Body and Font Styles --- */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            margin: 0;
            padding: 20px;
            background-image: linear-gradient(to top right, #ffb75e, #ed8f03);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        /* --- Main Dashboard Container --- */
        .dashboard-container {
            width: 100%;
            max-width: 1400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- General Card/Box Styling --- */
        .card {
            background-color: #ffffff;
            border: 2px solid black;
            border-radius: 16px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.25);
        }

        /* --- Row Layouts --- */
        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            width: 100%;
        }
        
        /* --- Stat Card Specifics --- */
        .stat-card {
            flex: 1;
            min-width: 150px;
            text-align: center;
        }

        .stat-card h3 {
            margin: 0 0 10px 0;
            font-size: 1em;
            color: #555;
            font-weight: 600;
        }

        .stat-card .number {
            margin: 0;
            font-size: 2.5em;
            font-weight: bold;
            color: #000;
        }
        
        /* --- Chart Card Specifics --- */
        .chart-card {
           flex-grow: 1;
           min-height: 450px; /* Ensure cards have a minimum height */
        }
        
        .chart-card h3 {
            margin-top: 0;
            text-align: center;
        }
        
        .chart-container {
            position: relative;
            flex-grow: 1;
            width: 100%;
            max-height: 400px; /* Max height for scrollable chart */
            overflow-y: auto; /* Make it scrollable if content overflows */
        }

        .line-chart-container {
             max-height: none; /* Override for line chart */
             overflow-y: visible;
        }
        
        /* --- Sizing for different chart rows --- */
        .row .chart-col-3 {
            flex: 1 1 0; 
            min-width: 0;
        }
        
        .row .chart-col-donut {
            flex: 3;
            min-width: 0;
        }
        
        .row .chart-col-trend {
            flex: 7;
            min-width: 0;
        }
        
        /* --- Responsive Adjustments --- */
        @media (max-width: 992px) {
            .row .chart-col-3,
            .row .chart-col-donut,
            .row .chart-col-trend {
                flex-basis: 100%;
                flex-grow: 0;
            }
        }
        
        @media (max-width: 768px) {
            body {
                padding: 10px;
                align-items: flex-start;
            }
            .dashboard-container, .row {
                gap: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <!-- Row 1: Interactive Header -->
        <div class="header" style="display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 20px;">
    
            <!-- Date Filter Card -->
            <div class="card" style="flex-direction: row; align-items: center; gap: 15px; padding: 10px 20px;">
                <label for="start-date" style="font-weight: 500;">Start Date:</label>
                <input type="date" id="start-date" style="padding: 8px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px;">
                
                <label for="end-date" style="font-weight: 500; margin-left: 10px;">End Date:</label>
                <input type="date" id="end-date" style="padding: 8px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px;">
            </div>
        
            <!-- Refresh Button -->
            <button id="refresh-data-btn" style="padding: 12px 22px; border: 2px solid black; border-radius: 16px; background-image: linear-gradient(to top right, #ffb75e, #ed8f03); color: black; font-weight: bold; font-size: 1em; cursor: pointer; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); transition: all 0.2s ease;">
                Refresh Data
            </button>
        
        </div>

        <!-- Row 2: Statistics Cards -->
        <div class="row">
            <div class="card stat-card">
                <h3>Total Push To ERP</h3>
                <p id="total-push" class="number">...</p>
            </div>
            <div class="card stat-card">
                <h3>Unique Push To ERP</h3>
                <p id="unique-push" class="number">...</p>
            </div>
            <div class="card stat-card">
                <h3>Total Applications</h3>
                <p id="total-apps" class="number">-</p>
            </div>
            <div class="card stat-card">
                <h3>Primary Applications</h3>
                <p id="primary-apps" class="number">-</p>
            </div>
            <div class="card stat-card">
                <h3>Total Admissions</h3>
                <p id="total-admissions" class="number">-</p>
            </div>
        </div>

        <!-- Row 3: Column Graph Cards -->
        <div class="row">
            <div class="card chart-card chart-col-3">
                <h3>Leads Pushed by University</h3>
                <div class="chart-container">
                    <canvas id="leadsPushedChart"></canvas>
                </div>
            </div>
            <div class="card chart-card chart-col-3">
                <h3>Primary Applications</h3>
                <div class="chart-container">
                    <p style="text-align:center; padding-top:20px;">Chart coming soon...</p>
                </div>
            </div>
            <div class="card chart-card chart-col-3">
                <h3>Primary Admissions</h3>
                <div class="chart-container">
                    <p style="text-align:center; padding-top:20px;">Chart coming soon...</p>
                </div>
            </div>
        </div>

        <!-- Row 4: Donut and Line Graph Cards -->
        <div class="row">
            <div class="card chart-card chart-col-donut">
                <h3>Lead Composition</h3>
                 <div class="chart-container line-chart-container">
                    <canvas id="leadCompositionChart"></canvas>
                </div>
            </div>
            <div class="card chart-card chart-col-trend">
                <h3>Push to ERP and Unique Trend</h3>
                 <div class="chart-container line-chart-container">
                    <canvas id="pushTrendChart"></canvas>
                </div>
            </div>
        </div>
    </div>

<script>
    // --- Your new, real-time Google Apps Script Web App URL ---
    const webAppUrl = 'https://script.google.com/macros/s/AKfycbyTDEwfpIUS78Rg8hHdMLx676LKZpBzytz6nnRb5doQpHltTC2Isfahb1dXHrKOMtka/exec';

    // This global variable will hold the master dataset.
    let masterData = [];

    // This function runs when the page is loaded
    document.addEventListener('DOMContentLoaded', () => {
        const startDateInput = document.getElementById('start-date');
        const endDateInput = document.getElementById('end-date');
        const refreshButton = document.getElementById('refresh-data-btn');

        if (startDateInput && endDateInput && refreshButton) {
            startDateInput.addEventListener('change', updateDashboardView);
            endDateInput.addEventListener('change', updateDashboardView);
            refreshButton.addEventListener('click', loadDashboardData);
        } else {
            console.error("Could not find date filter or refresh button elements. Please check your HTML IDs.");
        }
        
        loadDashboardData(); // Initial data load
    });

    /**
     * Main function to fetch real-time data from the Google Apps Script Web App.
     */
    async function loadDashboardData() {
        const refreshButton = document.getElementById('refresh-data-btn');
        try {
            if(refreshButton) {
                refreshButton.textContent = '🔄 Refreshing...';
                refreshButton.disabled = true;
            }

            const response = await fetch(webAppUrl);
            if (!response.ok) throw new Error(`Network response was not ok: ${response.statusText}`);

            const data = await response.json();
            if (data.error) throw new Error(`Error from Apps Script: ${data.error}`);
            
            // The data from the API is now the single source of truth.
            // No client-side validation is needed as the Apps Script handles it.
            masterData = data;
            
            if (masterData.length === 0) throw new Error('No data received from the Web App.');
            
            updateDashboardView();

        } catch (error) {
            console.error('Error loading dashboard data:', error);
            document.getElementById('total-push').innerText = 'Error';
            document.getElementById('unique-push').innerText = 'Error';
        } finally {
             if(refreshButton) {
                refreshButton.textContent = 'Refresh Data';
                refreshButton.disabled = false;
            }
        }
    }

    /**
     * This function filters the master data and re-renders all charts.
     */
    function updateDashboardView() {
        const startDateInput = document.getElementById('start-date');
        const endDateInput = document.getElementById('end-date');
        
        if (!startDateInput || !endDateInput) {
            processAndRenderAll(masterData);
            return;
        }
        
        const startDate = startDateInput.value;
        const endDate = endDateInput.value;
        
        console.log(`Filtering data between: Start='${startDate || 'None'}' and End='${endDate || 'None'}'`);

        const filteredData = masterData.filter(row => {
            // The 'Captured On' field is already a trustworthy YYYY-MM-DD string from our API.
            const rowDate = row['Captured On'];
            if (!rowDate) return false;

            const isAfterStartDate = !startDate || rowDate >= startDate;
            const isBeforeEndDate = !endDate || rowDate <= endDate;
            
            return isAfterStartDate && isBeforeEndDate;
        });
        
        console.log(`Filtering complete. Showing ${filteredData.length} of ${masterData.length} total records.`);
        
        processAndRenderAll(filteredData);
    }

    /**
     * Helper function to run all rendering processes.
     */
    function processAndRenderAll(data) {
        processAndRenderKPIs(data);
        processAndRenderLeadsPushedChart(data);
        processAndRenderLeadCompositionChart(data);
        processAndRenderPushTrendChart(data);
    }
    
    function processAndRenderKPIs(data) {
        const totalPushes = data.length;
        console.log("--- Starting Unique Count Diagnosis ---");
        console.log(`Total rows being processed in current view: ${data.length}`);
        const allMobileNumbers = data.map(row => ({
            original: row['Mobile Number'],
            cleaned: String(row['Mobile Number'] || '').replace(/[^0-9]/g, ''),
            name: row['Name'] || 'No Name Provided'
        }));
        const validMobileNumbers = allMobileNumbers.filter(num => num.cleaned);
        const invalidOrBlankRows = allMobileNumbers.filter(num => !num.cleaned);
        const uniqueMobileNumbersSet = new Set(validMobileNumbers.map(num => num.cleaned));
        const uniquePushes = uniqueMobileNumbersSet.size;
        console.log(`Found ${uniquePushes} unique mobile numbers.`);
        if (invalidOrBlankRows.length > 0) {
            console.warn(`WARNING: Found ${invalidOrBlankRows.length} rows with blank or invalid mobile numbers. These are NOT included in the unique count.`);
            console.table(invalidOrBlankRows.map(row => ({ Name: row.name, OriginalMobileEntry: row.original })));
        } else {
            console.log("All rows processed had a valid mobile number entry.");
        }
        console.log("--- End of Diagnosis ---");
        document.getElementById('total-push').innerText = totalPushes;
        document.getElementById('unique-push').innerText = uniquePushes;
    }

    function processAndRenderLeadsPushedChart(data) {
        const universityCounts = data.reduce((acc, row) => {
            const university = row['Opportunity: University Interested In'];
            if (university) acc[university] = (acc[university] || 0) + 1;
            return acc;
        }, {});
        const sortedUniversities = Object.entries(universityCounts).sort(([, a], [, b]) => b - a);
        const labels = sortedUniversities.map(entry => entry[0]);
        const counts = sortedUniversities.map(entry => entry[1]);
        const ctx = document.getElementById('leadsPushedChart').getContext('2d');
        if(window.leadsPushedChart instanceof Chart) { window.leadsPushedChart.destroy(); }
        window.leadsPushedChart = new Chart(ctx, {
            type: 'bar',
            data: { labels, datasets: [{ label: 'Leads Pushed', data: counts, backgroundColor: 'rgba(237, 143, 3, 0.7)', borderColor: 'rgba(237, 143, 3, 1)', borderWidth: 1 }] },
            options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true } } }
        });
    }
    
    function processAndRenderLeadCompositionChart(data) {
        const totalPushes = data.length;
        const uniquePushes = new Set(data.map(row => String(row['Mobile Number'] || '').replace(/[^0-9]/g, '')).filter(Boolean)).size;
        const duplicatePushes = totalPushes - uniquePushes;
        const ctx = document.getElementById('leadCompositionChart').getContext('2d');
        if(window.leadCompositionChart instanceof Chart) { window.leadCompositionChart.destroy(); }
        window.leadCompositionChart = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: ['Unique Leads', 'Duplicate Leads'], datasets: [{ data: [uniquePushes, duplicatePushes], backgroundColor: ['#ed8f03', '#ffb75e'], hoverOffset: 4 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } } }
        });
    }

    function processAndRenderPushTrendChart(data) {
        const dailyData = {};
        data.forEach(row => {
            const formattedDate = row['Captured On'];
            if (!formattedDate) return;
            const mobile = String(row['Mobile Number'] || '').replace(/[^0-9]/g, '');
            if (!dailyData[formattedDate]) {
                dailyData[formattedDate] = { total: 0, uniqueMobiles: new Set() };
            }
            dailyData[formattedDate].total++;
            if(mobile) dailyData[formattedDate].uniqueMobiles.add(mobile);
        });
        const sortedDates = Object.keys(dailyData).sort();
        const labels = sortedDates;
        const totalPushData = sortedDates.map(date => dailyData[date].total);
        const uniquePushData = sortedDates.map(date => dailyData[date].uniqueMobiles.size);
        
        if(labels.length > 0) {
            console.log("First 5 dates being sent to trend chart:", labels.slice(0, 5));
        } else {
            console.log("No valid date data to create trend chart.");
        }

        const ctx = document.getElementById('pushTrendChart').getContext('2d');
        if(window.pushTrendChart instanceof Chart) { window.pushTrendChart.destroy(); }
        window.pushTrendChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels,
                datasets: [
                    { label: 'Total Pushes', data: totalPushData, borderColor: '#ed8f03', backgroundColor: 'rgba(237, 143, 3, 0.1)', fill: true, tension: 0.1 },
                    { label: 'Unique Pushes', data: uniquePushData, borderColor: '#6a3d9a', backgroundColor: 'rgba(106, 61, 154, 0.1)', fill: true, tension: 0.1 }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true }, x: { type: 'time', time: { unit: 'day', tooltipFormat: 'dd/MM/yyyy' } } }, plugins: { legend: { position: 'top' } } }
        });
    }
</script>

</body>
</html>
